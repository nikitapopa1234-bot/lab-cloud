apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab1-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab1-app
  template:
    metadata:
      labels:
        app: lab1-app
    spec:
      containers:
      - name: lab1-app
        image: lab1-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: lab1-service
spec:
  type: NodePort
  selector:
    app: lab1-app
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30095