version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: lab3-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: parola123
      POSTGRES_DB: userdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lab3-network

  backend:
    build: ./backend
    container_name: lab3-backend
    ports:
      - "4000:4000"
    environment:
      DB_HOST: postgres
      DB_USER: admin
      DB_PASS: parola123
      DB_NAME: userdb
    depends_on:
      - postgres
    networks:
      - lab3-network

  frontend:
    build: ./frontend
    container_name: lab3-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - lab3-network

volumes:
  postgres-data:

networks:
  lab3-network:
    driver: bridge